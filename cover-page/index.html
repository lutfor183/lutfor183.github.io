<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Cover Page Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #f4f4f4;
            --font-color: #333;
            --border-color: #ddd;
            --a4-width: 210mm;
            --a4-height: 297mm;
        }

        body {
            /* CHANGED: Switched to a universal font for cross-browser consistency */
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--secondary-color);
            color: var(--font-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease-in-out;
            box-sizing: border-box;
        }

        h1, h2 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="date"] {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            width: 100%;
            box-sizing: border-box;
            /* Added font-family inheritance for consistency */
            font-family: inherit; 
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.2);
        }
        
        input.error {
            border-color: #d9534f;
        }

        .date-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .date-group label {
            margin-bottom: 0;
            font-weight: normal;
        }

        button {
            grid-column: 1 / -1;
            padding: 12px 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
             /* Added font-family inheritance for consistency */
            font-family: inherit;
        }

        button:hover {
            background-color: #0055a4;
        }
        
        button.secondary {
            background-color: #6c757d;
        }
        button.secondary:hover {
            background-color: #5a6268;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Autocomplete Styles */
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            border: 1px solid var(--border-color);
            border-top: none;
            background: white;
            z-index: 99;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }
        
        .suggestion-item small {
            color: #777;
            margin-left: 8px;
        }

        /* Page hiding */
        .hidden {
            display: none !important;
        }
        
        /* Template Selection Page */
        #template-page h2 {
            margin-bottom: 20px;
        }
        .template-options {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
        }

        .template-choice {
            border: 2px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 150px;
        }
        
        .template-choice:hover, .template-choice.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 51, 102, 0.2);
            transform: translateY(-5px);
        }
        
        .template-choice img {
            max-width: 100px;
            margin-bottom: 10px;
        }
        
        #preview-container {
            background: #e0e0e0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            overflow-x: auto; 
        }

        /* A4 Page Preview Styling */
        .a4-page {
            width: var(--a4-width);
            height: var(--a4-height);
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transform-origin: top center;
            transform: scale(0.3); /* Scale down for on-screen preview */
            box-sizing: border-box;
            padding: 2cm;
            color: black;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            flex-shrink: 0; 
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .action-buttons button {
            grid-column: auto;
            width: 200px;
        }

        /* Template Specific Styles */
        .cover-logo {
            width: 100px;
            height: auto;
            margin-bottom: 30px;
        }

        .cover-title { font-size: 28pt; font-weight: bold; }
        .cover-course-name { font-size: 20pt; margin-top: 15px; }
        .cover-course-code { font-size: 16pt; margin-top: 8px; font-style: italic; color: #444;}
        
        .info-section {
            margin-top: auto;
            margin-bottom: auto;
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 14pt;
            padding: 40px 0;
        }
        .info-block { line-height: 1.6; }
        .info-block h3 { font-size: 16pt; margin-bottom: 15px; border-bottom: 1px solid #666; padding-bottom: 5px;}
        .info-block p { margin: 4px 0; }
        
        .date-section {
            font-size: 14pt;
            margin-top: auto;
        }

        /* Template 1: Centered Classic */
        .template1 { text-align: center; }
        .template1 .cover-logo { margin-left: auto; margin-right: auto; }
        .template1 .info-section { text-align: left; }
        
        /* Template 2: Left Aligned Modern */
        .template2 { text-align: left; }
        .template2 .cover-logo { margin-left: 0; margin-right: 0; }
        .template2 .date-section { text-align: left; }

        /* Template 3: Two Columns */
        .template3 { text-align: center; }
        .template3 .cover-logo { margin-left: auto; margin-right: auto; }
        .template3 .info-section {
             display: grid;
             grid-template-columns: 1fr 1fr;
             gap: 40px;
             text-align: left;
        }
        .template3 .info-block { width: 100%; }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5em;
            }
            .form-grid { 
                grid-template-columns: 1fr; 
            }
            .a4-page { 
                transform: scale(0.25); 
            }
            .template-options { 
                flex-direction: column; 
                align-items: center;
            }
            .action-buttons { 
                flex-direction: column; 
                align-items: center; 
            }
            .action-buttons button {
                width: 100%;
                max-width: 300px;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <div id="input-page">
            <h1>Cover Page Generator</h1>
            <form id="cover-form" onsubmit="return false;">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="title">Assignment / Report Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="courseName">Course Name</label>
                        <input type="text" id="courseName" autocomplete="off" required>
                        <div id="course-suggestions" class="autocomplete-suggestions"></div>
                    </div>
                    <div class="form-group">
                        <label for="courseCode">Course Code</label>
                        <input type="text" id="courseCode" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="teacherName">Submitted To (Teacher's Name)</label>
                        <input type="text" id="teacherName" placeholder="Start typing a name..." autocomplete="off" required>
                        <div id="teacher-suggestions" class="autocomplete-suggestions"></div>
                    </div>
                    
                    <hr style="grid-column: 1 / -1; border: 0; border-top: 1px solid #eee;">

                    <div class="form-group">
                        <label for="studentName">Submitted By (Your Name)</label>
                        <input type="text" id="studentName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="studentId">ID / Roll No.</label>
                        <input type="text" id="studentId" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="studentSection">Section</label>
                        <input type="text" id="studentSection" required>
                    </div>
                    
                     <div class="form-group">
                        <label for="studentBatch">Batch</label>
                        <input type="text" id="studentBatch" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="submissionDate">Date of Submission</label>
                        <input type="date" id="submissionDate" required>
                         <div class="date-group">
                            <input type="checkbox" id="use-today-date">
                            <label for="use-today-date">Use Today's Date</label>
                        </div>
                    </div>

                    <button type="button" id="next-btn">Create Cover Page</button>
                </div>
            </form>
        </div>

        <div id="template-page" class="hidden">
            <h2>1. Choose a Template</h2>
            <div class="template-options">
                <div class="template-choice" data-template="1">
                    <img src="img/template1.svg" alt="Centered Template Icon">
                    <strong>Classic Centered</strong>
                </div>
                <div class="template-choice" data-template="2">
                     <img src="img/template2.svg" alt="Left Aligned Template Icon">
                    <strong>Modern Left</strong>
                </div>
                <div class="template-choice" data-template="3">
                    <img src="img/template3.svg" alt="Two Column Template Icon">
                    <strong>Structured Columns</strong>
                </div>
            </div>

            <h2 id="preview-heading" class="hidden">2. Preview & Download</h2>
            <div id="preview-container" class="hidden">
                </div>
            
            <div class="action-buttons">
                <button type="button" id="back-btn" class="secondary">Back to Edit</button>
                <button type="button" id="download-btn" class="hidden">Download as JPG (300 PPI)</button>
            </div>
        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
</body>
</html>
